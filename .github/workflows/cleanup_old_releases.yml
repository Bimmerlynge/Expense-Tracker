name: Cleanup old APK release assets

on:
  workflow_dispatch: 
  release:
    types: [published]

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete APK assets from old releases
        uses: actions/github-script@v7
        with:
          script: |
            const keep = 3;

            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const oldReleases = releases.slice(keep);

            for (const release of oldReleases) {
              for (const asset of release.assets) {
                if (asset.name.endsWith(".apk")) {
                  console.log(`Deleting ${asset.name} from ${release.tag_name}`);
                  await github.rest.repos.deleteReleaseAsset({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    asset_id: asset.id,
                  });
                }
              }
            }
