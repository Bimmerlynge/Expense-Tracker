name: Publish release from pubspec

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}
      apk_path: ${{ steps.rename.outputs.apk_path }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.38.6'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Prepare keystore
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 --decode > android/${{ secrets.KEYSTORE_ALIAS }}.jks

      - name: Prepare key.properties
        run: |
          echo "storeFile=../${{ secrets.KEYSTORE_ALIAS }}.jks" > android/key.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEYSTORE_ALIAS }}" >> android/key.properties
          echo "keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}" >> android/key.properties

      - name: Prepare environment
        run: |
          echo "GIT_URL_DOWNLOAD=${{ secrets.GIT_URL_DOWNLOAD }}" > lib/app/config/environment/.env-prod
          echo "AUTH_TOKEN=${{ secrets.AUTH_TOKEN }}" >> lib/app/config/environment/.env-prod
          echo "EXPENSE_TRACKER_API_HOST=${{ secrets.API_HOST }}" >> lib/app/config/environment/.env-prod

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        id: rename
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NEW_PATH="build/app/outputs/flutter-apk/expense_tracker_${VERSION}.apk"
          mv build/app/outputs/flutter-apk/app-release.apk "$NEW_PATH"
          echo "apk_path=$NEW_PATH" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ${{ steps.rename.outputs.apk_path }}
          retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write-all

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v5
        with:
          name: release-apk
          path: ./release-apk

      - name: Create Git tag
        run: |
          git tag v${{ needs.build.outputs.version }}
          git push origin v${{ needs.build.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: v${{ needs.build.outputs.version }}
          files: ./release-apk/*.apk